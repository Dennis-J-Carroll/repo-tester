name: Security Scan

on:
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install repo-tester from source
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify CLI entry point
        run: |
          repo-tester --help

      - name: Run security scan
        id: scan
        run: |
          repo-tester https://github.com/${{ github.repository }} --format json > scan-results.json
          cat scan-results.json
        continue-on-error: true

      - name: Verify scan output exists
        id: verify
        run: |
          if [ ! -f scan-results.json ] || [ ! -s scan-results.json ]; then
            echo "::error::Scan produced no output — scan-results.json is missing or empty"
            exit 1
          fi
          echo "Scan output verified."

      - name: Parse results
        id: parse
        run: |
          CRITICAL=$(jq -r '.summary.CRITICAL // 0' scan-results.json)
          HIGH=$(jq -r '.summary.HIGH // 0' scan-results.json)
          MEDIUM=$(jq -r '.summary.MEDIUM // 0' scan-results.json)
          LOW=$(jq -r '.summary.LOW // 0' scan-results.json)
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH"         >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM"     >> $GITHUB_OUTPUT
          echo "low=$LOW"           >> $GITHUB_OUTPUT
          echo "## Security Scan Results"          >> $GITHUB_STEP_SUMMARY
          echo ""                                   >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |"               >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|"               >> $GITHUB_STEP_SUMMARY
          echo "| 🔴 CRITICAL | $CRITICAL |"        >> $GITHUB_STEP_SUMMARY
          echo "| 🟠 HIGH     | $HIGH |"            >> $GITHUB_STEP_SUMMARY
          echo "| 🟡 MEDIUM   | $MEDIUM |"          >> $GITHUB_STEP_SUMMARY
          echo "| 🔵 LOW      | $LOW |"             >> $GITHUB_STEP_SUMMARY

      - name: Fail on CRITICAL or HIGH findings
        if: steps.parse.outputs.critical > 0 || steps.parse.outputs.high > 0
        run: |
          echo "::error::Found ${{ steps.parse.outputs.critical }} CRITICAL and ${{ steps.parse.outputs.high }} HIGH severity issues"
          exit 1

      - name: Report findings
        if: steps.parse.outputs.critical == 0 && steps.parse.outputs.high == 0
        run: |
          echo "No CRITICAL or HIGH findings. Scan passed."
